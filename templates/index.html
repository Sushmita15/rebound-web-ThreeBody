<!doctype html>
<html>
  <head>
    <title>Three-Body Dashboard</title>
    <style>
      /* This layout creates the "One Site" feel */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
        margin: 0;
        background: #111;
        color: white;
      }

      #sidebar {
        width: 320px;
        padding: 30px;
        background: #222;
        border-right: 1px solid #444;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        z-index: 10;
      }

      #viz-container {
        flex-grow: 1;
        position: relative;
        overflow: hidden;
      }

      /* The "Window" into REBOUND */
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: black;
      }

      h2 {
        color: #00d4ff;
        margin-top: 0;
      }
      .input-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.9em;
        color: #aaa;
      }
      input {
        width: 100%;
        padding: 10px;
        background: #333;
        border: 1px solid #555;
        color: white;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #00d4ff;
        border: none;
        color: #000;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        background: #0099ff;
      }
      #banner {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff3b3b;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: bold;
  display: none;
  z-index: 9999999; 
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
    </style>
  </head>
  <body>
  <div id="banner">Particle Ejected</div>

    <div id="sidebar">
      <h2>REBOUND Sim</h2>
      <p>Adjust initial conditions for the restricted test particle.</p>

      <div class="input-group">
        <label>Initial X Position</label>
        <input type="number" id="x" value="0.8" step="0.1" />
      </div>

      <div class="input-group">
        <label>Initial Vy Velocity</label>
        <input type="number" id="vy" value="0.5" step="0.1" />
      </div>

      <button onclick="startSim()">Launch Orbit</button>
    </div>

    <div id="viz-container">
      <iframe id="rebound-frame" src="about:blank"></iframe>
    </div>

    <script>
      let lastState = false;

setInterval(() => {
  fetch("/status")
    .then(res => res.json())
    .then(data => {

      if (data.ejected && !lastState) {
        // 👇 THIS acts like a Python-triggered event
        SimEvents.dispatchEvent(new Event("ejection"));
      }

      lastState = data.ejected;
    });
}, 300);

      function startSim() {
        // Get user inputs
        const x = document.getElementById("x").value;
        const vy = document.getElementById("vy").value;

        document.getElementById("rebound-frame").src = "about:blank";

        // Tell Flask to start the math
        fetch("/update_sim", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          //use parsefloat to convert the string inputs to numbers before sending to the browser
          body: JSON.stringify({ x: parseFloat(x), vy: parseFloat(vy)}),
        }).then(() => {
          // Wait 1 second for the REBOUND server to initialize,
          // then point the iframe to it.
          setTimeout(() => {
            document.getElementById("rebound-frame").src =
  "http://127.0.0.1:1234";
          }, 1000);
        });
      }

      // Listen for ejection events from the server
SimEvents.addEventListener("ejection", () => {
  pushBanner("🚨 Particle Ejected");
});
    </script>
  </body>
</html>
