<!DOCTYPE html>
<html>
<head>
    <title>REBOUND Live Viz</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; padding: 20px; background: #222; color: white; }
        #viz-container { flex-grow: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        input { width: 90%; padding: 8px; margin-bottom: 20px; }
        button { width: 100%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Controls</h2>
    <label>Start X:</label><br>
    <input type="number" id="x" value="0.5" step="0.1">
    
    <label>Start Vy:</label><br>
    <input type="number" id="vy" value="0.5" step="0.1">
    
    <button onclick="startSim()">Launch Simulation</button>
</div>

<div id="viz-container">
    <iframe id="rebound-frame" src=""></iframe>
</div>

<script>
    function startSim() {
        const x = document.getElementById('x').value;
        const vy = document.getElementById('vy').value;

        fetch('/update_sim', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({x: x, vy: vy})
        }).then(() => {
            // Give the server a second to start, then refresh the iframe
            setTimeout(() => {
                document.getElementById('rebound-frame').src = "http://localhost:5500";
            }, 1000);
        });
    }
</script>

</body>
</html>
